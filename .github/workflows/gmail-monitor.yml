name: Gmail Monitor

on:
  schedule:
    - cron: "7-59/15 * * * *"  # every 15 minutes, offset to avoid collisions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gmail_monitor.py
        env:
          DISCORD_WEBHOOK_BACHTRACK: ${{ secrets.DISCORD_WEBHOOK_BACHTRACK }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_SUBJECT_KEYWORD: ${{ secrets.GMAIL_SUBJECT_KEYWORD }} # optional
        run: python gmail_monitor.py

      - name: Pull latest changes
        run: git pull origin main --rebase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Gmail state
          file_pattern: .
          skip_dirty_check: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

